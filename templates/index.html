<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Count to Infinity</title>

  <style>
    body {background-color: black; font-family: Arial, sans-serif; text-align: center; padding: 2rem; }
    h1{color: white;}
    #count {color: white; font-size: 3rem; margin: 1rem 0; }
    .gifs { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-top:1rem; }
    .gifs img { max-width: 150px; height: auto; }
    button { font-size:1.25rem; padding:0.5rem 1rem; cursor:pointer; }
  </style>
</head>

<body>
  <h1>Count to Infinity</h1>

  <div id="count">Current count: <strong>{{ count }}</strong></div>

  <form id="incForm" action="/increment" method="post">
    <button type="submit">Increment</button>
  </form>

  <div class="gifs" id="gifs">
    {% for g in gifs %}
      <img src="/gifs/{{ g }}" alt="{{ g }}" loading="lazy" />
    {% endfor %}
  </div>

  <script src="/socket.io/socket.io.js"></script>
<script>
  // If page is served from :8080, this connects to same origin.
  const socket = io({
    transports: ['websocket'],
    upgrade: true
  });

  socket.on('connect', () => {
    console.log('socket connected', socket.id);
  });

  socket.on('count_updated', (data) => {
    console.log('count_updated', data);
    // update DOM with data.count
  });

  socket.on('disconnect', () => {
    console.log('socket disconnected');
  });
</script>
</body>
</html>
